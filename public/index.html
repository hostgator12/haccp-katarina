<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HACCP Katarina</title>
</head>
<body style="font-family:Arial; padding:20px;">
  <h2>HACCP Sken - Hotel Katarina</h2>
  <p>Učitaj otpremnicu u PDF ili JPG format</p>
  
  <input type="file" id="file" accept=".pdf,.jpg,.jpeg,.png">
  <br><br>
  <button onclick="upload()" style="padding:10px 20px;">Skeniraj</button>
  
  <h3>Rezultat:</h3>
  <pre id="result" style="background:#f0f0f0; padding:10px;"></pre>

  <script>
    async function upload() {
      const file = document.getElementById('file').files[0];
      if (!file) {
        alert('Prvo odaberi fajl!');
        return;
      }
      const formData = new FormData();
      formData.append('otpremnica', file);
      document.getElementById('result').textContent = 'Čitam otpremnicu... pričekaj 10-20 sec';
      
      try {
        const res = await fetch('/api/scan', { method: 'POST', body: formData });
        const data = await res.json();
        document.getElementById('result').textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        document.getElementById('result').textContent = 'Greška: ' + err.message;
      }
    }
  </script>
</body>
</html>
